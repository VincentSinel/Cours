<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="content-type" content="text/html; charset=UTF-8">
  <meta http-equiv="content-language" content="fr">
  <link rel="stylesheet" href="/CSS/Cours.css">
  <script src="/Cours/DefinitionLoader.js"></script>

	<script>
		document.addEventListener("definitionsLoaded", CreateList)

		const folded = false;

		function CreateList()
		{
			var body = document.body
			Object.keys(Definitions).forEach(key => {
				let title = document.createElement("h1")
				title.innerText = key
				body.appendChild(title)
				let data = Definitions[key]

				let main = document.createElement("div")
				if (folded) main.classList.add("hidden");
				body.append(main)

				title.addEventListener("click", () => {
					main.classList.toggle("hidden")
				})

				if ("definitions" in data)
				{
					let subtitle = document.createElement("h2")
					subtitle.innerText = "Définition(s) :"
					main.appendChild(subtitle)

					let sub = document.createElement("div")
					if (folded) sub.classList.add("hidden");
					main.append(sub)

					subtitle.addEventListener("click", () => {
						sub.classList.toggle("hidden")
					})

					data["definitions"].forEach( def => {
						let div = document.createElement("div");
						div.classList.add("definition")
						div.innerHTML = def
						sub.appendChild(div)
					})
				}

				if ("proprietes" in data)
				{
					let subtitle = document.createElement("h2")
					subtitle.innerText = "Propriété(s) :"
					main.appendChild(subtitle)

					let sub = document.createElement("div")
					if (folded) sub.classList.add("hidden");
					main.append(sub)

					subtitle.addEventListener("click", () => {
						sub.classList.toggle("hidden")
					})

					if (data["proprietes"].length == 1)
					{
						let div = document.createElement("div");
						div.classList.add("definition")
						div.innerHTML = "<b><u>Propriété :</u></b><br>" + data["proprietes"][0];
						sub.appendChild(div)
					}
					else
					{
						let div = document.createElement("div");
						div.classList.add("definition")
						let result = "<b><u>Propriétés :</u></b><br><ul>"
						data["proprietes"].forEach(prop => {
							result += "<li>" + prop + "</li>"
						})
						div.innerHTML = result + "</ul>";
						sub.appendChild(div)
					}
				}

				if ("exemples" in data)
				{
					let subtitle = document.createElement("h2")
					subtitle.innerText = "Exemple(s) :"
					main.appendChild(subtitle)

					let sub = document.createElement("div")
					if (folded) sub.classList.add("hidden");
					main.append(sub)

					subtitle.addEventListener("click", () => {
						sub.classList.toggle("hidden")
					})

					let p = document.createElement("p")
					p.classList.add("exemple")
					if (data["exemples"].length > 1)
						p.innerHTML = "Exemples :"
					else
						p.innerHTML = "Exemple :"
					sub.appendChild(p)

					data["exemples"].forEach( exemple => {
						let div = document.createElement("div");
						div.innerHTML = exemple
						sub.appendChild(div)
					})
				}

				if ("remarques" in data)
				{
					let subtitle = document.createElement("h2")
					subtitle.innerText = "Remarque(s) :"
					main.appendChild(subtitle)

					let sub = document.createElement("div")
					if (folded) sub.classList.add("hidden");
					main.append(sub)

					subtitle.addEventListener("click", () => {
						sub.classList.toggle("hidden")
					})

					let p = document.createElement("p")
					p.classList.add("remarque")
					if (data["remarques"].length > 1)
						p.innerHTML = "Remarques :"
					else
						p.innerHTML = "Remarque :"
					sub.appendChild(p)

					let ul = document.createElement("ul")
					sub.append(ul)
					data["remarques"].forEach( remarque => {
						let li = document.createElement("li");
						li.innerHTML = remarque
						ul.appendChild(li)
					})
				}

				if ("infos" in data)
				{
					let subtitle = document.createElement("h2")
					subtitle.innerText = "Info(s) :"
					main.appendChild(subtitle)

					let sub = document.createElement("div")
					if (folded) sub.classList.add("hidden");
					main.append(sub)

					subtitle.addEventListener("click", () => {
						sub.classList.toggle("hidden")
					})

					data["infos"].forEach( info => {
						let div = document.createElement("div");
						div.innerHTML = info
						sub.appendChild(div)
					})
				}
				
			})
			MathJax.typesetPromise();
		}
	</script>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>
    MathJax = {
      tex: {inlineMath: [['$', '$'], ['\\(', '\\)']]}
    };
  </script>
	
  <script id="MathJax-script" async src="/JS/es5/tex-mml-chtml.js"></script>
	<script id="Animation" src="/JS/Animation/animation_holder.js"></script>
  <script src="/JS/Svg.js/svg.min.js"></script>
	<!-- <script src="https://cdn.jsdelivr.net/npm/@svgdotjs/svg.js@3.0/dist/svg.min.js"></script> -->
	<script src="/JS/Diagrammes/Diagramme_Holder.js"></script> 
	<script src="/JS/Animation_Transformations.js"></script>

  <title>Définitions</title>

  <style>
		h1::marker {
				display: list-item;
				content: counter(h1count, decimal) ") " !important;
				text-decoration: underline;
				color: var(--SectionPrincipale);
				font-weight: bold;
		}
  </style>

</head>

</body>
<script>
	const page_content_loaded = new CustomEvent("page_content_loaded");
	var script_load_count = 0;
	function LoadAnimations()
	{
		var list = [
			"/JS/Animation/Animations/Construction_Angle.js",
			"/JS/Animation/Animations/Mediatrice.js",
			"/JS/Animation/Animations/Parallele_Compas.js",
			"/JS/Animation/Animations/Parallele_Equerre.js",
			"/JS/Animation/Animations/Perpendiculaire_Compas.js",
			"/JS/Animation/Animations/Perpendiculaire_Equerre.js",
			"/JS/Animation/Animations/Regle_de_trois.js",
			"/JS/Animation/Animations/Symetrie_Axiale_Compas.js",
			"/JS/Animation/Animations/Symetrie_Axiale_Equerre.js",
			"/JS/Animation/Animations/Triangle_AngleLongueurs1.js",
			"/JS/Animation/Animations/Triangle_AngleLongueurs2.js",
			"/JS/Animation/Animations/Triangle_AnglesLongueur1.js",
			"/JS/Animation/Animations/Triangle_AnglesLongueur2.js",
			"/JS/Animation/Animations/Triangle_Longueurs.js"
		]
		script_load_count++
		list.forEach(script => {
			script_load_count++
			let script_node = document.createElement("script");
			script_node.src = script;
			script_node.async = false;
			script_node.onload = (e) => {
				script_load_count--; 
				EndLoadScript()
			}
			document.head.appendChild(script_node)
		})
		script_load_count--
		EndLoadScript();
	}
	function EndLoadScript()
	{
		if (script_load_count <= 0)
		{
			window.dispatchEvent(page_content_loaded);
			document.dispatchEvent(page_content_loaded);
			document.body.dispatchEvent(page_content_loaded);
		}
	}

	window.addEventListener("load", LoadAnimations);
</script>
</html>
